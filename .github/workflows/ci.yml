name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller build

      - name: Install playwright-cli
        run: npm install -g @playwright/cli@0.1.13

      - name: Validate release contract
        run: python scripts/validate_release_contract.py

      - name: Compile Python sources
        run: python -m py_compile run_gui.py chromium_advanced/*.py chromium_advanced/gui/*.py chromium_advanced/browser_engines/*.py scripts/*.py
