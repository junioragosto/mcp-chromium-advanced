name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: chromium-profile-manager-windows-x64
          - os: macos-13
            artifact_name: chromium-profile-manager-macos-x64
          - os: macos-14
            artifact_name: chromium-profile-manager-macos-arm64
          - os: ubuntu-latest
            artifact_name: chromium-profile-manager-linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller build

      - name: Install playwright-cli
        run: npm install -g @playwright/cli

      - name: Build wheel metadata
        run: python -m build --wheel

      - name: Build platform artifact
        run: python scripts/build_release.py --artifact-name "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/*
