name: release-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name_base: chromium-profile-manager-windows-x64
          - os: macos-13
            artifact_name_base: chromium-profile-manager-macos-x64
          - os: macos-14
            artifact_name_base: chromium-profile-manager-macos-arm64
          - os: ubuntu-latest
            artifact_name_base: chromium-profile-manager-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller build

      - name: Install playwright-cli
        run: npm install -g @playwright/cli@0.1.13

      - name: Validate release contract
        run: python scripts/validate_release_contract.py

      - name: Build platform artifact
        run: python scripts/build_release.py --artifact-name-base "${{ matrix.artifact_name_base }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name_base }}-${{ github.ref_name }}
          path: |
            out/*.zip
            out/*.tar.gz
            out/release-metadata.json
            out/update-manifest-stable.json
            out/update-manifest-rc.json
            out/sha256sums.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: release-artifacts/**/*
